# ===================================================================
# Signia Docker Compose設定
# フロントエンド（Next.js）、バックエンド（Express.js）、
# PostgreSQL、MinIOの4サービスを統合起動する
#
# 起動コマンド: docker compose up -d
# 前提: docker network create okegawaatclink-gaido-signia-network
# ===================================================================

services:
  # ===== フロントエンド（Next.js）=====
  frontend:
    # コンテナ名はinstance-config.mdに合わせて固定する
    # AI Agentコンテナからこの名前でアクセスできる
    container_name: okegawaatclink-gaido-signia-output-system
    build:
      # ビルドコンテキストを親ディレクトリに設定
      # これにより ssl-certificates/ へアクセス可能になる
      context: ..
      dockerfile: output_system/Dockerfile
      args:
        # NEXT_PUBLIC_API_URL はビルド時に埋め込まれる（ブラウザからは相対パス/api経由でアクセス）
        # Next.jsのrewritesで /api/* → バックエンドにプロキシされる
        NEXT_PUBLIC_API_URL: /api
    ports:
      # ホストポート3001 -> コンテナポート3001
      - "3001:3001"
    environment:
      - NODE_ENV=development
      # NEXT_PUBLIC_API_URL: クライアント（ブラウザ）からアクセスするAPIのベースURL
      # Next.jsのrewritesでバックエンドにプロキシされる（相対パスを使用）
      # 注意: NEXT_PUBLIC_* 変数はビルド時にバンドルに埋め込まれるため、
      #       コンテナ名（okegawaatclink-gaido-signia-output-system-backend）を
      #       設定するとブラウザからアクセスできない
      - NEXT_PUBLIC_API_URL=/api
      # BACKEND_URL: Next.jsサーバー側からバックエンドにアクセスする際のURL
      # next.config.jsのrewritesで使用する（コンテナ名でアクセス可能）
      - BACKEND_URL=http://okegawaatclink-gaido-signia-output-system-backend:3002
      # BACKEND_API_URL: NextAuth.jsのsignInコールバックからバックエンドにアクセスする際のURL
      # コンテナ内のサーバーサイド処理なのでコンテナ名でアクセスする
      - BACKEND_API_URL=http://okegawaatclink-gaido-signia-output-system-backend:3002
      # NEXTAUTH_URL: NextAuth.jsがOAuthコールバックURLを生成する際のベースURL
      # 本番環境では実際のドメインに変更すること
      - NEXTAUTH_URL=http://localhost:3001
      # AUTH_SECRET: NextAuth.jsのJWT署名・暗号化に使用するシークレットキー
      # 本番環境では強力なランダム文字列（最低32文字）に変更すること
      # 生成コマンド: openssl rand -base64 32
      - AUTH_SECRET=dev-nextauth-secret-change-in-production
      # Google OAuth設定（OAuth認証を使用する場合は実際の値を設定すること）
      # Google Cloud Consoleで取得: https://console.developers.google.com/
      # コールバックURL: http://localhost:3001/api/auth/callback/google
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID:-your-google-client-id}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET:-your-google-client-secret}
      # Apple Sign In設定（OAuth認証を使用する場合は実際の値を設定すること）
      # Apple Developerで取得: https://developer.apple.com/
      # コールバックURL: http://localhost:3001/api/auth/callback/apple
      - AUTH_APPLE_ID=${AUTH_APPLE_ID:-your-apple-service-id}
      - AUTH_APPLE_SECRET=${AUTH_APPLE_SECRET:-your-apple-private-key}
      # ViteのホストアクセスをコンテナDockerホスト名で許可（Next.jsには不要だが設定を統一）
      - __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS=okegawaatclink-gaido-signia-output-system
    depends_on:
      - backend
    restart: unless-stopped

  # ===== バックエンド（Express.js）=====
  backend:
    container_name: okegawaatclink-gaido-signia-output-system-backend
    build:
      context: ..
      dockerfile: output_system/Dockerfile.backend
    ports:
      # ホストポート3002 -> コンテナポート3002
      - "3002:3002"
    environment:
      - NODE_ENV=development
      # PostgreSQL接続文字列（db サービスのコンテナ名で指定）
      - DATABASE_URL=postgresql://signia:signia_pass@db:5432/signia
      # MinIO接続設定（minio サービスのコンテナ名で指定）
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=ebook-signing
      # JWT秘密鍵（本番環境では強力なランダム文字列に変更すること）
      - JWT_SECRET=dev-jwt-secret-change-in-production
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  # ===== PostgreSQL =====
  db:
    image: postgres:16-alpine
    # コンテナ名は固定しなくてもよいが、分かりやすさのために設定
    container_name: okegawaatclink-gaido-signia-db
    environment:
      - POSTGRES_DB=signia
      - POSTGRES_USER=signia
      - POSTGRES_PASSWORD=signia_pass
    volumes:
      # named volumeを使用（ホストバインドマウントは使用しない）
      - pgdata:/var/lib/postgresql/data
    # ヘルスチェック: PostgreSQLが起動するまでバックエンドを待機させる
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signia -d signia"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ===== MinIO（S3互換オブジェクトストレージ）=====
  minio:
    image: minio/minio
    container_name: okegawaatclink-gaido-signia-minio
    # MinIOサーバーを起動し、管理コンソールをポート9001で公開
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      # S3 API: ポート9000
      - "9000:9000"
      # 管理コンソール: ポート9001
      - "9001:9001"
    volumes:
      # named volumeを使用（ホストバインドマウントは使用しない）
      - miniodata:/data
    restart: unless-stopped

# ===== named volumes =====
# docker compose downではボリュームは削除されない（データ永続化）
# ボリューム削除: docker compose down -v
volumes:
  pgdata:
    driver: local
  miniodata:
    driver: local

# ===== ネットワーク設定 =====
# 外部ネットワーク（AI Agentコンテナと同じネットワーク）に参加する
# これにより AI Agent コンテナからコンテナ名でアクセスが可能になる
networks:
  default:
    name: okegawaatclink-gaido-signia-network
    external: true
